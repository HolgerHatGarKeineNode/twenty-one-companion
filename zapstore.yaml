# Zapstore-Publishing-Konfiguration für die TWENTY ONE Companion App.
# Veröffentlicht wird manuell nach jedem published GitHub-Release:
#   SIGN_WITH=$NOSTR_BUNKER  zsp publish zapstore.yaml
# Die Identität (pubkey) muss zur Signatur (Amber/Bunker) passen, sonst kein Whitelisting.

repository: https://github.com/HolgerHatGarKeineNode/twenty-one-companion
pubkey: npub1pt0kw36ue3w2g4haxq3wgm6a2fhtptmzsjlc2j2vphtcgle72qesgpjyc6

name: TWENTY ONE Companion
summary: Meetups, events, courses and places of the Bitcoin community
description: |
  The companion app for the TWENTY ONE Portal on Android: meetups, events,
  courses, lecturers and places — right in your pocket.

  - Meetups & events with a region filter
  - Map of all meetups (OpenStreetMap)
  - Courses & lecturers
  - Sign in with Lightning (LNURL-auth) or Nostr (NIP-55, e.g. Amber)
  - Offline-ready: recently loaded data stays available
  - German & English

tags:
  - bitcoin
  - nostr
  - meetups
  - community
  - lightning
  - events

website: https://portal.einundzwanzig.space

release_notes: ./dist/v1.1.1/zapstore-changelog.md

icon: ./public/icon.png

images:
  - ./assets/screenshots/01-welcome.webp
  - ./assets/screenshots/02-language.webp
  - ./assets/screenshots/03-region.webp
  - ./assets/screenshots/04-connect-account.webp
  - ./assets/screenshots/05-notifications.webp
  - ./assets/screenshots/06-events.webp
