# Zapstore-Publishing-Konfiguration für die TWENTY ONE Companion App.
# Veröffentlicht wird manuell nach jedem published GitHub-Release:
#   SIGN_WITH=$NOSTR_BUNKER  zsp publish zapstore.yaml
# Die Identität (pubkey) muss zur Signatur (Amber/Bunker) passen, sonst kein Whitelisting.

repository: https://github.com/HolgerHatGarKeineNode/twenty-one-companion
pubkey: npub1pt0kw36ue3w2g4haxq3wgm6a2fhtptmzsjlc2j2vphtcgle72qesgpjyc6

name: TWENTY ONE Companion
summary: Meetups, events, courses and group chat of the Bitcoin community
description: |
  The companion app for the TWENTY ONE Portal on Android: meetups, events,
  courses, lecturers and places — right in your pocket.

  - Meetups & events with a region filter
  - Map of all meetups (OpenStreetMap)
  - Courses & lecturers
  - Group chat on Nostr (NIP-29) with Lightning zaps (NIP-57)
  - Chat notifications without Goolag: your phone checks the relay itself in the
    background — no Play Services, no second app, no push server in between. Off by default.
  - Built-in wallet: connect Alby / any NWC wallet, send & receive sats
  - Amber offline mode: sign on-device via NIP-55, no round-trips
  - Sign in with Nostr: Amber on-device (NIP-55) or a remote bunker (NIP-46, incl. QR)
  - Offline-ready: the chat is cached on-device, recently loaded data stays available
  - 8 languages: German, English, Spanish, Portuguese, Dutch, Polish, Hungarian, Latvian

tags:
